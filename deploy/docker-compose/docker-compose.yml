version: '3'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=djangoblog
      - MYSQL_ROOT_PASSWORD=QQQQwww123!@#
    ports:
      - 3307:3306
    volumes:
      - mysql_data:/var/lib/mysql
    depends_on:
      - redis
    container_name: db

  djangoblog:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: always
    command: bash -c 'sh /code/djangoblog/deploy/entrypoint.sh'
    ports:
      - "8000:8000"
    volumes:
      # 使用named volume共享静态文件给nginx
      - static_files:/code/djangoblog/collectedstatic
      - ./logs:/code/djangoblog/logs
      - ./uploads:/code/djangoblog/uploads
      # 挂载源代码，entrypoint启动时会拷贝到工作目录，无需rebuild
      - ../../:/host-source
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_MYSQL_DATABASE=djangoblog
      - DJANGO_MYSQL_USER=root
      - DJANGO_MYSQL_PASSWORD=QQQQwww123!@#
      - DJANGO_MYSQL_HOST=db
      - DJANGO_MYSQL_PORT=3306
      - DJANGO_REDIS_URL=redis:6379
      
    links:
      - db
      - redis
    depends_on:
      - db
      - redis
    container_name: djangoblog
  nginx:
    restart: always
    image: nginx:1.27-alpine
    ports:
      - "81:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf
      # 使用同一个named volume访问静态文件
      - static_files:/code/djangoblog/collectedstatic:ro
    links:
      - djangoblog:djangoblog
    container_name: nginx

  redis:
    restart: always
    image: redis:alpine
    container_name: redis
    ports:
      - "6380:6379"

volumes:
  mysql_data:
  static_files:
