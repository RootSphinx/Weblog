{% load blog_tags %}
{% load i18n %}
{# 一言 Hitokoto #}
<div class="border-3 border-solid border-[#1a1a1a] bg-[#fef5f5] dark:bg-[#3a2a2a] dark:border-[#555] p-4 shadow-[3px_3px_0_#1a1a1a] dark:shadow-[3px_3px_0_#555] relative"
     x-data="{ hitokoto: '', fromWho: '', from: '', loading: true }"
     x-init="fetch('https://api.timelessq.com/sentence?type=a,b,c')
         .then(r => r.json())
         .then(json => {
             var d = json.data || json;
             hitokoto = d.hitokoto || '';
             fromWho = d.from_who || '';
             from = d.from || '';
             loading = false;
         })
         .catch(() => {
             hitokoto = 'コードは詩であり、バグは韻である。';
             fromWho = 'RootSphinx';
             from = 'DjangoBlog';
             loading = false;
         })">
    <h3 class="mb-2 flex items-center gap-2 text-xs font-black text-[#1a1a1a] dark:text-white uppercase tracking-wider m-0">
        <span class="border-2 border-[#1a1a1a] dark:border-[#555] bg-[#e53935] text-white px-1.5 py-0.5 text-[10px]">一言</span>
    </h3>
    {# Speech bubble pointer #}
    <div class="absolute -bottom-2 right-6 w-0 h-0 border-l-[8px] border-r-[8px] border-t-[10px] border-l-transparent border-r-transparent border-t-[#e53935] dark:border-t-[#ff6b6b]"></div>
    <p class="m-0 text-sm leading-relaxed text-[#555] dark:text-[#ccc] italic" x-text="loading ? '加载中...' : '“' + hitokoto + '”'"></p>
    <p class="mt-1.5 text-[11px] font-bold text-[#aaa] dark:text-[#888] text-right" x-show="!loading">
        <span x-text="'—— ' + fromWho"></span>
        <template x-if="from">
            <span x-text="' 《' + from + '》'"></span>
        </template>
    </p>
</div>
