{% load i18n %}
{% load blog_tags %}
<footer class="mt-12 border-t-3 border-solid border-[#444] bg-[#2a2a2a] dark:bg-[#1a1a2e] dark:border-[#555]">
    <div class="mx-auto max-w-6xl px-4 py-6 lg:px-6">
        <div class="flex flex-col items-center gap-3 text-center">
            {# Powered by #}
            <p class="text-xs text-[#aaa] dark:text-[#888]">
                Powered by <span class="font-bold text-[#4ecdc4]">Django</span>
                &nbsp;·&nbsp;
                <a href="https://github.com/liangliangyy/DjangoBlog"
                   target="_blank" rel="noopener"
                   class="text-[#4ecdc4] hover:text-[#ffe66d] transition-colors font-bold">
                    liangliangyy
                </a>
            </p>
            {# Copyright + Beian #}
            <div class="flex flex-wrap items-center justify-center gap-3 text-[11px] text-[#888] dark:text-[#666]">
                <span>&copy; {% now "Y" %} <strong class="text-[#ff6b6b]">RootSphinx</strong></span>
                {% if BEIAN_CODE %}
                    <a href="https://beian.miit.gov.cn/" target="_blank" rel="nofollow"
                       class="text-[#888] dark:text-[#666] hover:text-[#ffe66d] transition-colors">
                        {{ BEIAN_CODE }}
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</footer>
