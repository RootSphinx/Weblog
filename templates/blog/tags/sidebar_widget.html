{% load blog_tags %}
{% load i18n %}
{# 自定义侧边栏组件 #}
{% if widget %}
<div class="border-3 border-solid border-[#1a1a1a] bg-white dark:bg-[#2a2a3e] dark:border-[#555] p-4 shadow-[3px_3px_0_#1a1a1a] dark:shadow-[3px_3px_0_#555]">
    <h3 class="mb-3 flex items-center gap-2 text-xs font-black text-[#1a1a1a] dark:text-white uppercase tracking-wider m-0">
        <span class="border-2 border-[#1a1a1a] dark:border-[#555] bg-[#f5f0eb] dark:bg-[#333] text-[#555] dark:text-[#ccc] px-1.5 py-0.5 text-[10px]">{{ widget.name }}</span>
    </h3>
    <div class="text-sm leading-relaxed text-[#555] dark:text-[#ccc]">
        {{ widget.content|sidebar_markdown }}
    </div>
</div>
{% endif %}
